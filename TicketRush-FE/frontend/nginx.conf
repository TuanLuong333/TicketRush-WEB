server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend ExpressJS service
    location /api/ {
        proxy_pass http://ticketrush-backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy health check endpoint to backend
    location /health {
        proxy_pass http://ticketrush-backend:4000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy static media file requests (banners/seating charts)
    location /uploads/ {
        proxy_pass http://ticketrush-backend:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
